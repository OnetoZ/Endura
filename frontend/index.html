<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://accounts.google.com https://apis.google.com https://checkout.razorpay.com https://cdn.razorpay.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https: http://localhost:*; connect-src 'self' http://localhost:* ws://localhost:* https: wss: https://api.razorpay.com; frame-src 'self' https://accounts.google.com https://checkout.razorpay.com https://api.razorpay.com; object-src 'none';" />
  
  <!-- SEO Safety Net (Fallback) -->
  <title>ENDURA | Cinematic Apparel</title>
  <meta name="description" content="Endura is a premium streetwear brand based in Bangalore, India. Discover cinematic apparel, oversized hoodies, techwear, and digital vault collectibles." />
  <meta name="keywords" content="Endura, Streetwear India, Bangalore Fashion, Cinematic Apparel, Digital Vault, Oversized Hoodies" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://wearendura.com/" />
  <meta property="og:title" content="ENDURA | Cinematic Apparel" />
  <meta property="og:description" content="Premium streetwear and digital collectibles in Bangalore." />
  <meta property="og:image" content="https://wearendura.com/logo.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://wearendura.com/" />
  <meta property="twitter:title" content="ENDURA | Cinematic Apparel" />
  <meta property="twitter:description" content="Premium streetwear and digital collectibles in Bangalore." />
  <meta property="twitter:image" content="https://wearendura.com/logo.png" />

  <!-- Structured Data for Organization and Website (Encourages Google Sitelinks like your example) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://wearendura.com/#organization",
          "name": "ENDURA",
          "url": "https://wearendura.com/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://wearendura.com/logo.png"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://wearendura.com/#website",
          "url": "https://wearendura.com/",
          "name": "ENDURA",
          "publisher": {
            "@id": "https://wearendura.com/#organization"
          }
        }
      ]
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Oswald:wght@500;700&display=swap"
